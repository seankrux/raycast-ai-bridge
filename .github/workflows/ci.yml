name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  detect-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect project files
        id: detect
        run: |
          echo "has_node=false" >> "$GITHUB_OUTPUT"
          echo "has_python=false" >> "$GITHUB_OUTPUT"
          if [ -f package.json ]; then echo "has_node=true" >> "$GITHUB_OUTPUT"; fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ]; then echo "has_python=true" >> "$GITHUB_OUTPUT"; fi

      - name: Run Node CI
        if: steps.detect.outputs.has_node == 'true'
        run: |
          set -e
          node -v || true
          npm ci || npm install
          if npm run | grep -q "test"; then npm test || true; fi

      - name: Run Python CI
        if: steps.detect.outputs.has_python == 'true'
        run: |
          set -e
          python -V || true
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install . || true; fi
          if python -m pytest -q; then echo "Tests passed"; else echo "No tests or failures"; fi

      - name: No CI detected
        if: steps.detect.outputs.has_node != 'true' && steps.detect.outputs.has_python != 'true'
        run: echo "No Node/Python project files detected — no tests to run"
